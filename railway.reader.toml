# Newcomer vision reader — the 4th service (Marcos 7/18: "I want these reads to happen
# on their own through the Anthropic API"). Point the reader service's Config-as-code
# (Settings → Config-as-code) at THIS file so it doesn't inherit the bot's railway.toml.
#
# Pattern = the bot's own: CRON-started each weekday at 12:50 UTC = 8:50am ET during EDT
# (Marcos 7/18: "morning reads should happen around 8:50 so there's enough time"; adjust to
# 13:50 when DST ends in November, same as the bot's 12:45). Reads in three waves:
#   8:50  — Kev-sheet SHADOW reads (his levels canonical, ours stored beside for grading)
#   ~8:55 — morning scanner batch (the bot's watching list, read before the open)
#   all day — every newcomer that joins the scanner (trickle, ~90s poll)
# Exits at NEWCOMER_STOP_HHMM (15:30 ET). restart=never: the daily exit is NORMAL — the
# next cron re-arms tomorrow. Known limit: a mid-day crash stays down until the next cron
# (the bot is unaffected — it fails closed to already-marked names).
#
# Env needed on THIS service: ANTHROPIC_API_KEY, SCREENER_URL,
# START_APP=newcomer_vision_reader.py, NEWCOMER_VISION_MODEL=<bake-off winner>.
# Isolation: watchPatterns means reader-only pushes rebuild ONLY the reader; and this
# service's life/death never touches the bot — the only coupling is the dashboard store.
[build]
builder = "nixpacks"
watchPatterns = ["newcomer_vision_reader.py"]

[deploy]
startCommand = "python newcomer_vision_reader.py"
restartPolicyType = "never"

[cron]
schedule = "50 12 * * 1-5"
