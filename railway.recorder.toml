# Recorder service config. Point the recorder's "Railway Config File" (Settings →
# Config-as-code) at THIS file so it stops inheriting the bot's railway.toml.
# Gives the recorder its own: start command, restart=ALWAYS (crash recovery — the
# internal supervisor handles soft errors; this covers hard process death), and its
# own watch path (recorder pushes rebuild only the recorder; bot/dashboard untouched).
[build]
builder = "nixpacks"
watchPatterns = ["recorder.py"]

[deploy]
startCommand = "python recorder.py"
restartPolicyType = "always"
