[build]
builder = "nixpacks"
# SHARED config: bot + dashboard + recorder all read THIS file (START_APP picks the entrypoint);
# only the reader has its own railway.reader.toml. So watchPatterns here must cover EVERY
# sharing service's files — 7/20 night: listing only bot files silently blocked ALL dashboard
# deploys ("No changes to watched files"). Proper per-service configs = task #53.
watchPatterns = ["marcos_trading_bot.py", "screener_app.py", "recorder.py", "railway.toml"]

[deploy]
startCommand = "python ${START_APP:-marcos_trading_bot.py}"
restartPolicyType = "never"

[cron]
schedule = "45 12 * * 1-5"
